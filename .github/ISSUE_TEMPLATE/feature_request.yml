name: ✨ 功能建议 / Feature Request
description: 提议一个新功能或改进 / Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提建议！请先在 [Issues](https://github.com/Akxan/GhostTrack-CN/issues) 搜索是否已有相同提议。
        Welcome to suggest! Please search existing issues first.

  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / What problem are you trying to solve?
      description: 描述你遇到的痛点或场景
      placeholder: 我想批量查 100 个 IP 的国家分布，目前只能一个个查...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你的方案 / Proposed solution
      description: 你希望工具怎么实现
      placeholder: |
        新增 `--batch ips.txt` 参数，从文件读取 IP 列表批量查询，输出 CSV
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered
      description: 你考虑过的其他方式

  - type: dropdown
    id: priority
    attributes:
      label: 优先级 / Priority
      options:
        - 锦上添花 / Nice-to-have
        - 比较需要 / Important
        - 影响使用 / Critical
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿 / Contribution
      options:
        - label: 我愿意提交 PR 实现这个功能 / I'm willing to submit a PR
        - label: 我可以帮忙测试 / I can help test
