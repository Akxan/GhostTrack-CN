name: Publish to PyPI

# ⚠️ 当前仅手动触发（workflow_dispatch）—— 避免在 PyPI trusted publisher
# 未配置时推 tag 会让 CI 红。
#
# 想自动发布到 PyPI 时再改回 push tag 触发：
#   1. 在 PyPI 添加 trusted publisher:
#      Owner=Akxan, Repo=SpyEyes, Workflow=publish-pypi.yml, Env=pypi
#      https://pypi.org/manage/account/publishing/
#   2. GitHub repo Settings → Environments 创建 'pypi'
#   3. 把下面 'on:' 改回 push.tags + workflow_dispatch
#   4. 推 tag v1.0.x 即自动发布

on:
  workflow_dispatch:
  # 等 PyPI trusted publisher 配好后取消下面注释:
  # push:
  #   tags:
  #     - "v*"

jobs:
  build-and-publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/spyeyes/
    permissions:
      # OIDC Trusted Publishing 需要 id-token: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel contents（确保 platforms.json 在内）
        run: |
          python -m zipfile -l dist/*.whl | grep platforms.json || \
            (echo "ERROR: platforms.json 不在 wheel 里" && exit 1)

      - name: Smoke test installed wheel
        run: |
          pip install dist/*.whl
          spyeyes --version
          python -c "import spyeyes; assert len(spyeyes.PLATFORMS) > 2000"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 不传 password —— 用 OIDC trusted publishing
