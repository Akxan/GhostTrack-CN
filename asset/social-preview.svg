<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#7ee787" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#7ee787" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280 M0 320 H1280 M0 400 H1280 M0 480 H1280 M0 560 H1280"/>
    <path d="M80 0 V640 M160 0 V640 M240 0 V640 M320 0 V640 M400 0 V640 M480 0 V640 M560 0 V640 M640 0 V640 M720 0 V640 M800 0 V640 M880 0 V640 M960 0 V640 M1040 0 V640 M1120 0 V640 M1200 0 V640"/>
  </g>

  <!-- Decorative left eye / surveillance icon -->
  <g transform="translate(170 320)">
    <circle r="120" fill="url(#eye)"/>
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="none" stroke="#7ee787" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="32" fill="#0d1117" stroke="#7ee787" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="16" fill="#7ee787"/>
    <circle cx="6" cy="-6" r="5" fill="#0d1117"/>
    <!-- crosshair -->
    <line x1="-100" y1="0" x2="-90" y2="0" stroke="#7ee787" stroke-width="2"/>
    <line x1="90" y1="0" x2="100" y2="0" stroke="#7ee787" stroke-width="2"/>
    <line x1="0" y1="-65" x2="0" y2="-55" stroke="#7ee787" stroke-width="2"/>
    <line x1="0" y1="55" x2="0" y2="65" stroke="#7ee787" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="340" y="225"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', monospace"
        font-size="118" font-weight="900" fill="url(#title)" filter="url(#glow)"
        letter-spacing="-2">
    SpyEyes
  </text>

  <!-- Subtitle Chinese -->
  <text x="340" y="290"
        font-family="-apple-system, 'PingFang SC', sans-serif"
        font-size="34" font-weight="500" fill="#c9d1d9">
    OSINT 多平台账号侦查工具
  </text>

  <!-- Subtitle English -->
  <text x="340" y="335"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" font-weight="400" fill="#8b949e">
    All-in-One OSINT Toolkit · 2067 platforms · Bilingual
  </text>

  <!-- Feature pills -->
  <g font-family="-apple-system, 'PingFang SC', monospace" font-size="20" font-weight="600">
    <g transform="translate(340 410)">
      <rect width="100" height="42" rx="21" fill="#1f6feb" opacity="0.25" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#58a6ff">IP</text>
    </g>
    <g transform="translate(450 410)">
      <rect width="100" height="42" rx="21" fill="#238636" opacity="0.25" stroke="#7ee787" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#7ee787">电话</text>
    </g>
    <g transform="translate(560 410)">
      <rect width="120" height="42" rx="21" fill="#bf8700" opacity="0.25" stroke="#e3b341" stroke-width="1.5"/>
      <text x="60" y="28" text-anchor="middle" fill="#e3b341">用户名</text>
    </g>
    <g transform="translate(690 410)">
      <rect width="100" height="42" rx="21" fill="#a371f7" opacity="0.25" stroke="#bc8cff" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#bc8cff">WHOIS</text>
    </g>
    <g transform="translate(800 410)">
      <rect width="80" height="42" rx="21" fill="#db61a2" opacity="0.25" stroke="#ff7eb6" stroke-width="1.5"/>
      <text x="40" y="28" text-anchor="middle" fill="#ff7eb6">MX</text>
    </g>
    <g transform="translate(890 410)">
      <rect width="100" height="42" rx="21" fill="#f85149" opacity="0.25" stroke="#ff7b72" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#ff7b72">邮箱</text>
    </g>
  </g>

  <!-- Bottom CLI demo -->
  <g transform="translate(340 530)">
    <text font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="20" fill="#6e7681">
      <tspan x="0" y="0">$ spy user akxan --quick</tspan>
    </text>
    <text font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="20" fill="#7ee787" font-weight="600">
      <tspan x="0" y="32">→ 命中 165/727 平台 · 21 秒完成 · 中英双语</tspan>
    </text>
  </g>

  <!-- Top right badge -->
  <g transform="translate(1010 60)">
    <rect width="220" height="38" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="110" y="25" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, monospace"
          font-size="14" fill="#7ee787" font-weight="700">
      ⭐ MIT · Python 3.10+
    </text>
  </g>
</svg>
