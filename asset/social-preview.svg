<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#7ee787" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280 M0 320 H1280 M0 400 H1280 M0 480 H1280 M0 560 H1280"/>
    <path d="M80 0 V640 M160 0 V640 M240 0 V640 M320 0 V640 M400 0 V640 M480 0 V640 M560 0 V640 M640 0 V640 M720 0 V640 M800 0 V640 M880 0 V640 M960 0 V640 M1040 0 V640 M1120 0 V640 M1200 0 V640"/>
  </g>

  <!-- Decorative ghost icon -->
  <g transform="translate(140 280)" opacity="0.85">
    <path d="M 0 -80
             C -50 -80, -80 -50, -80 0
             L -80 80
             L -65 65
             L -50 80
             L -35 65
             L -20 80
             L -5 65
             L 10 80
             L 25 65
             L 40 80
             L 55 65
             L 70 80
             L 80 80
             L 80 0
             C 80 -50, 50 -80, 0 -80 Z"
          fill="#7ee787" opacity="0.18"/>
    <circle cx="-25" cy="-15" r="10" fill="#0d1117"/>
    <circle cx="25" cy="-15" r="10" fill="#0d1117"/>
    <circle cx="-25" cy="-15" r="3" fill="#7ee787"/>
    <circle cx="25" cy="-15" r="3" fill="#7ee787"/>
  </g>

  <!-- Title -->
  <text x="280" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', monospace"
        font-size="98" font-weight="800" fill="url(#title)" filter="url(#glow)">
    GhostTrack-CN
  </text>

  <!-- Subtitle Chinese -->
  <text x="280" y="285"
        font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif"
        font-size="36" font-weight="500" fill="#c9d1d9">
    OSINT 信息查询工具中文增强版
  </text>

  <!-- Subtitle English -->
  <text x="280" y="335"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" font-weight="400" fill="#8b949e">
    All-in-One OSINT Toolkit · Chinese-Enhanced Edition
  </text>

  <!-- Feature pills -->
  <g font-family="-apple-system, 'PingFang SC', monospace" font-size="20" font-weight="600">
    <g transform="translate(280 410)">
      <rect width="100" height="42" rx="21" fill="#1f6feb" opacity="0.25" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#58a6ff">IP</text>
    </g>
    <g transform="translate(390 410)">
      <rect width="100" height="42" rx="21" fill="#238636" opacity="0.25" stroke="#7ee787" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#7ee787">电话</text>
    </g>
    <g transform="translate(500 410)">
      <rect width="120" height="42" rx="21" fill="#bf8700" opacity="0.25" stroke="#e3b341" stroke-width="1.5"/>
      <text x="60" y="28" text-anchor="middle" fill="#e3b341">用户名</text>
    </g>
    <g transform="translate(630 410)">
      <rect width="100" height="42" rx="21" fill="#a371f7" opacity="0.25" stroke="#bc8cff" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#bc8cff">WHOIS</text>
    </g>
    <g transform="translate(740 410)">
      <rect width="80" height="42" rx="21" fill="#db61a2" opacity="0.25" stroke="#ff7eb6" stroke-width="1.5"/>
      <text x="40" y="28" text-anchor="middle" fill="#ff7eb6">MX</text>
    </g>
    <g transform="translate(830 410)">
      <rect width="100" height="42" rx="21" fill="#f85149" opacity="0.25" stroke="#ff7b72" stroke-width="1.5"/>
      <text x="50" y="28" text-anchor="middle" fill="#ff7b72">邮箱</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(280 530)">
    <text font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="20" fill="#6e7681">
      <tspan x="0" y="0">$ python3 GhostTR.py ip 8.8.8.8 --json | jq -r '.country'</tspan>
    </text>
    <text font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="20" fill="#7ee787" font-weight="600">
      <tspan x="0" y="32">→ 美国 (United States)  🇺🇸</tspan>
    </text>
  </g>

  <!-- Top right badge -->
  <g transform="translate(1050 60)">
    <rect width="180" height="38" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="90" y="25" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, monospace"
          font-size="14" fill="#7ee787" font-weight="700">
      ⭐ MIT · Python 3.9+
    </text>
  </g>
</svg>
